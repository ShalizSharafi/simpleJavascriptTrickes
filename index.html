<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Travle Website</title>
       <link rel="stylesheet" href="stylesheet/out.css">
</head>
<body>
       <!-- header -->
       <header class="w-full h-20  flex *:h-full px-5 duration-500 ">
              <div class="w-1/2  flex items-center justify-start gap-1">
                     <span>
                       <img src="images/sun-fill.png" alt="" class="w-full h-full object-cover themeSwitch" data-status="off">
                     </span>
                     <span class="w-12 h-12 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="grey" class="size-7">
  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
</svg>

                     </span>
                     <span class=" capitalize font-medium text-[#757575] text-2xl ">logo</span>
              </div>
              <div class="w-1/2  flex items-center justify-end">
                     <span class="w-12 h-12  flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="grey" class="size-7">
  <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
</svg>

                     </span>
              </div>
       </header>
       <!-- image section -->
        <section class="w-full h-screen bg-[url(../images/london2.jpg)] bg-cover bg-center bg-no-repeat">
              <!-- popupwall -->
              <div class="w-full h-screen backdrop-blur-[3px] hidden  fixed top-0 left-0 popUpWall"></div>
              <!-- popup box -->
              <div class="popUp w-62.5 lg:w-150  bg-white  fixed top-1/2 left-[-200%] -translate-x-1/2 -translate-y-1/2 shadow-xl shadow-black/40 flex flex-wrap content-start duration-500">
                     <nav class="w-full flex bg-black">
                            <ul class="w-full flex flex-wrap justify-start items-center h-full">
                                   <li class=" px-2.5 py-1.5 bg-[#f44336]
                                    flex items-center gap-2 "><span class="w-5 h-5 flex items-baseline justify-center">
                                          <img src="images/Hotel Bed 4.png" alt="" class="w-full h-full object-cover">
                                   </span><a href="" class=" text-white capitalize font-light text-[16px]">hotel</a></li>
                                   <li class="popupLi"><a href="" class=" ">flight</a></li>
                                   <li class="popupLi"><a href="" class=" ">rental</a></li>
                            </ul>
                     </nav>
                     <div class="w-full flex p-4 bg-white flex-wrap  gap-3">
                            <h3 class="w-full flex text-start items-center text-2xl text-black font-light">Find the best hotels
</h3>
                            <p class="w-full flex text-[16px] text-gray-700 font-light">Book a hotel with us and get the best fares and promotions.

</p>
                            <h4 class="w-full flex text-[18px] text-gray-700 font-light">We know hotels - we know comfort.


</h4>
                            <div class="w-full flex gap-2 items-center justify-start mt-2.5">
                                   <a class="link">
                                   <span >search hotels</span>
                            </a>
                             <a class="link closePopUp">
                                   <span>no, thanks</span>
                            </a>
                            </div>
                     </div>
                     <audio src="sound/litupsubway-ui-close-sfx-513359.mp3" id="sound"></audio>
              </div>
        </section>
</body>
<script src="js/master.js">

</script>
</html>
